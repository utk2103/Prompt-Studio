name: Bug report
description: Report defects, including regressions, crashes, and behavior bugs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing this report. Keep every answer concise, reproducible, and grounded in observed evidence.
        Do not speculate or infer beyond the evidence. If a narrative section cannot be answered from the available evidence, respond with exactly `NOT_ENOUGH_INFO`.

        If this is a release blocker, rename the issue title to `Release blocker: <feature-area> - <summary>` and apply the `release-blocker` label after filing.
  - type: dropdown
    id: bug_type
    attributes:
      label: Bug type
      description: Choose the category that best matches this report.
      options:
        - Regression (worked before, now fails)
        - Crash (process/app exits or hangs)
        - Behavior bug (incorrect output/state without crash)
    validations:
      required: true
  - type: dropdown
    id: release_blocker
    attributes:
      label: Release blocker
      description: >
        Choose `Yes` only if this blocks the current release. Selecting `Yes` does not apply the label
        automatically — you must also rename the issue title to `Release blocker: <feature-area> - <summary>`
        for the automation to apply the `release-blocker` label.
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence statement of what is broken, based only on observed evidence. If the evidence is insufficient, respond with exactly `NOT_ENOUGH_INFO`.
      placeholder: After upgrading from 1.2.0 to 1.3.0, prompt variables stopped rendering in the output panel; reproduced twice and confirmed by browser console errors.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide the shortest deterministic repro path supported by direct observation. If the repro path cannot be grounded from the evidence, respond with exactly `NOT_ENOUGH_INFO`.
      placeholder: |
        1. Open Prompt Studio 1.3.0 and create a prompt with a `{{variable}}` placeholder.
        2. Run the prompt using the "Execute" button.
        3. Observe that the variable is not substituted in the output and check the browser console for the attached error.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: State the expected result using a concrete reference such as prior observed behavior, attached docs, or a known-good version. If no grounded reference exists, respond with exactly `NOT_ENOUGH_INFO`.
      placeholder: In version 1.2.0, prompt variables were substituted correctly in the output panel using the same template.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe only the observed result, including user-visible errors and cited evidence. If the observed result cannot be grounded from the evidence, respond with exactly `NOT_ENOUGH_INFO`.
      placeholder: The output panel shows the raw `{{variable}}` string instead of the substituted value; the attached console log shows `TypeError: Cannot read properties of undefined` at 14:23:08 UTC.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Prompt Studio version
      description: Exact version/build tested.
      placeholder: <version such as 1.3.0>
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS and version where this occurs.
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: input
    id: install_method
    attributes:
      label: Install method
      description: How Prompt Studio was installed or launched.
      placeholder: npm dev / docker / vercel / self-hosted
  - type: input
    id: model
    attributes:
      label: Model
      description: Effective model under test.
      placeholder: anthropic/claude-sonnet-4-6 / openai/gpt-4o / openrouter/meta-llama/llama-3.1-70b
    validations:
      required: true
  - type: input
    id: provider_chain
    attributes:
      label: Provider / routing chain
      description: Effective request path through gateways, proxies, providers, or model routers.
      placeholder: prompt-studio -> litellm -> anthropic
    validations:
      required: true
  - type: textarea
    id: provider_setup_details
    attributes:
      label: Additional provider/model setup details
      description: Optional. Include redacted routing details, per-agent overrides, auth-profile interactions, env/config context, or anything else needed to explain the effective provider/model setup. Do not include API keys, tokens, or passwords.
      placeholder: |
        Default route is prompt-studio -> litellm -> anthropic.
        Previous setup was prompt-studio -> litellm -> openrouter -> anthropic.
        Relevant config lives in .env under LITELLM_MODEL and LLM_PROVIDER, or in the workspace settings panel under Models.
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, and evidence
      description: Include the redacted logs, screenshots, recordings, docs, or version comparisons that support the grounded answers above.
      render: shell
  - type: textarea
    id: impact
    attributes:
      label: Impact and severity
      description: |
        Explain who is affected, how severe it is, how often it happens, and the practical consequence using only observed evidence.
        If any part cannot be grounded from the evidence, respond with exactly `NOT_ENOUGH_INFO`.
        Include:
        - Affected users/systems/channels
        - Severity (annoying, blocks workflow, data risk, etc.)
        - Frequency (always/intermittent/edge case)
        - Consequence (missed messages, failed onboarding, extra cost, etc.)
      placeholder: |
        Affected: All users running prompts with variables on 1.3.0
        Severity: High (blocks core prompt execution workflow)
        Frequency: 4/4 observed attempts
        Consequence: Prompts return raw template strings instead of processed output
  - type: textarea
    id: additional_information
    attributes:
      label: Additional information
      description: Add any remaining grounded context that helps triage but does not fit above. If this is a regression, include the last known good and first known bad versions when observed. If there is not enough evidence, respond with exactly `NOT_ENOUGH_INFO`.
      placeholder: Last known good version 1.2.0, first known bad version 1.3.0, temporary workaround is inlining variable values directly into the prompt text.